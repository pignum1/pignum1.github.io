<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>MCP 架构图</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #F9FAFB; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
  </style>
</head>
<body>
<svg width="750" height="310" viewBox="0 0 750 310">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>

  <rect width="750" height="310" fill="#F9FAFB" rx="12"/>
  <text x="375" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#111827">MCP 协议架构 — AI 的 USB 接口</text>

  <!-- ===== Host ===== -->
  <g filter="url(#s)">
    <rect x="25" y="55" width="155" height="220" rx="14" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
    <text x="102" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#DC2626">Host 宿主</text>
    <text x="102" y="100" text-anchor="middle" font-size="10" fill="#7F1D1D">Claude / Cursor</text>
    <rect x="45" y="118" width="115" height="32" rx="8" fill="white" stroke="#EF4444" stroke-width="1"/>
    <text x="102" y="139" text-anchor="middle" font-size="11" fill="#DC2626">Client 1</text>
    <rect x="45" y="162" width="115" height="32" rx="8" fill="white" stroke="#EF4444" stroke-width="1"/>
    <text x="102" y="183" text-anchor="middle" font-size="11" fill="#DC2626">Client 2</text>
    <rect x="45" y="206" width="115" height="32" rx="8" fill="white" stroke="#EF4444" stroke-width="1"/>
    <text x="102" y="227" text-anchor="middle" font-size="11" fill="#DC2626">Client 3</text>
  </g>

  <!-- MCP 协议箭头 -->
  <line x1="180" y1="134" x2="260" y2="100" stroke="#3B82F6" stroke-width="2" marker-end="url(#ab)"/>
  <text x="215" y="108" text-anchor="middle" font-size="10" font-weight="bold" fill="#3B82F6">MCP</text>
  <line x1="180" y1="178" x2="260" y2="190" stroke="#3B82F6" stroke-width="2" marker-end="url(#ab)"/>
  <text x="215" y="196" text-anchor="middle" font-size="10" font-weight="bold" fill="#3B82F6">MCP</text>
  <line x1="180" y1="222" x2="260" y2="270" stroke="#3B82F6" stroke-width="2" marker-end="url(#ab)"/>
  <text x="215" y="256" text-anchor="middle" font-size="10" font-weight="bold" fill="#3B82F6">MCP</text>

  <!-- ===== Servers ===== -->
  <g filter="url(#s)">
    <rect x="265" y="60" width="195" height="70" rx="14" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
    <text x="362" y="86" text-anchor="middle" font-size="13" font-weight="bold" fill="#059669">Server: 文件系统</text>
    <text x="362" y="104" text-anchor="middle" font-size="10" fill="#064E3B">read / write / list_dir</text>
    <text x="362" y="120" text-anchor="middle" font-size="9" fill="#047857">Tools: 文件操作工具集</text>
  </g>

  <g filter="url(#s)">
    <rect x="265" y="155" width="195" height="70" rx="14" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
    <text x="362" y="181" text-anchor="middle" font-size="13" font-weight="bold" fill="#059669">Server: 数据库</text>
    <text x="362" y="199" text-anchor="middle" font-size="10" fill="#064E3B">query / insert / update</text>
    <text x="362" y="215" text-anchor="middle" font-size="9" fill="#047857">Tools: 数据库操作工具集</text>
  </g>

  <g filter="url(#s)">
    <rect x="265" y="250" width="195" height="55" rx="14" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
    <text x="362" y="276" text-anchor="middle" font-size="13" font-weight="bold" fill="#059669">Server: GitHub</text>
    <text x="362" y="294" text-anchor="middle" font-size="10" fill="#064E3B">create_pr / merge / search</text>
  </g>

  <!-- ===== 右侧说明 ===== -->
  <g filter="url(#s)">
    <rect x="500" y="55" width="225" height="220" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <text x="612" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">角色类比</text>

    <rect x="515" y="95" width="195" height="28" rx="6" fill="#FEE2E2"/>
    <text x="612" y="114" text-anchor="middle" font-size="11" fill="#DC2626">Host = 电脑（AI 应用）</text>

    <rect x="515" y="130" width="195" height="28" rx="6" fill="#DBEAFE"/>
    <text x="612" y="149" text-anchor="middle" font-size="11" fill="#2563EB">Client = USB 控制器</text>

    <rect x="515" y="165" width="195" height="28" rx="6" fill="#D1FAE5"/>
    <text x="612" y="184" text-anchor="middle" font-size="11" fill="#059669">Server = USB 设备</text>

    <line x1="520" y1="205" x2="705" y2="205" stroke="#E5E7EB" stroke-width="1"/>
    <text x="612" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="#111827">核心价值</text>
    <text x="612" y="245" text-anchor="middle" font-size="10" fill="#6B7280">一次接入，处处可用</text>
    <text x="612" y="262" text-anchor="middle" font-size="10" fill="#6B7280">工具开发者按 MCP 标准写 Server</text>
  </g>

</svg>
</body>
</html>
