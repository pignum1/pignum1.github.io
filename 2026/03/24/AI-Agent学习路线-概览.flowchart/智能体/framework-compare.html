<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>三种实现对比</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #F9FAFB; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
  </style>
</head>
<body>
<svg width="780" height="400" viewBox="0 0 780 400">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#059669"/>
    </marker>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>

  <rect width="780" height="400" fill="#F9FAFB" rx="12"/>
  <text x="390" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#111827">同一功能，三种实现方式</text>

  <!-- ===== 纯 Python ===== -->
  <rect x="25" y="48" width="235" height="330" rx="14" fill="white" stroke="#EF4444" stroke-width="2"/>
  <!-- 头部 -->
  <rect x="25" y="48" width="235" height="38" rx="14" fill="#FEE2E2"/>
  <rect x="25" y="72" width="235" height="14" fill="#FEE2E2"/>
  <text x="142" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="#DC2626">纯 Python 手搓</text>

  <g filter="url(#s)">
    <rect x="48" y="100" width="190" height="30" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
    <text x="143" y="120" text-anchor="middle" font-size="11" fill="#DC2626">while 循环</text>
  </g>
  <line x1="143" y1="130" x2="143" y2="143" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <g filter="url(#s)">
    <rect x="48" y="148" width="190" height="30" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
    <text x="143" y="168" text-anchor="middle" font-size="11" fill="#DC2626">手动解析 tool_calls</text>
  </g>
  <line x1="143" y1="178" x2="143" y2="191" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <g filter="url(#s)">
    <rect x="48" y="196" width="190" height="30" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
    <text x="143" y="216" text-anchor="middle" font-size="11" fill="#DC2626">手动执行函数</text>
  </g>
  <line x1="143" y1="226" x2="143" y2="239" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <g filter="url(#s)">
    <rect x="48" y="244" width="190" height="30" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
    <text x="143" y="264" text-anchor="middle" font-size="11" fill="#DC2626">手动拼接消息</text>
  </g>

  <text x="143" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#DC2626">~50 行代码</text>
  <text x="143" y="325" text-anchor="middle" font-size="10" fill="#7F1D1D">完全自定义 · 最高控制力</text>
  <text x="143" y="342" text-anchor="middle" font-size="10" fill="#7F1D1D">理解原理 · 学习首选</text>

  <!-- ===== LangChain ===== -->
  <rect x="275" y="48" width="235" height="330" rx="14" fill="white" stroke="#10B981" stroke-width="2"/>
  <rect x="275" y="48" width="235" height="38" rx="14" fill="#D1FAE5"/>
  <rect x="275" y="72" width="235" height="14" fill="#D1FAE5"/>
  <text x="392" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="#059669">LangChain</text>

  <g filter="url(#s)">
    <rect x="298" y="100" width="190" height="30" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
    <text x="393" y="120" text-anchor="middle" font-size="11" fill="#059669">AgentExecutor</text>
  </g>
  <line x1="393" y1="130" x2="393" y2="160" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="415" y="150" font-size="9" fill="#6B7280">自动</text>
  <g filter="url(#s)">
    <rect x="298" y="165" width="190" height="30" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
    <text x="393" y="185" text-anchor="middle" font-size="11" fill="#059669">create_tool_calling_agent</text>
  </g>
  <line x1="393" y1="195" x2="393" y2="225" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="415" y="215" font-size="9" fill="#6B7280">黑盒</text>
  <g filter="url(#s)">
    <rect x="298" y="230" width="190" height="30" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
    <text x="393" y="250" text-anchor="middle" font-size="11" fill="#059669">输出结果</text>
  </g>

  <text x="393" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#059669">~5 行代码</text>
  <text x="393" y="325" text-anchor="middle" font-size="10" fill="#064E3B">黑盒 · 快速原型</text>
  <text x="393" y="342" text-anchor="middle" font-size="10" fill="#064E3B">自动管理循环/错误/消息</text>

  <!-- ===== LangGraph ===== -->
  <rect x="525" y="48" width="235" height="330" rx="14" fill="white" stroke="#3B82F6" stroke-width="2"/>
  <rect x="525" y="48" width="235" height="38" rx="14" fill="#DBEAFE"/>
  <rect x="525" y="72" width="235" height="14" fill="#DBEAFE"/>
  <text x="642" y="73" text-anchor="middle" font-size="13" font-weight="bold" fill="#2563EB">LangGraph</text>

  <g filter="url(#s)">
    <rect x="548" y="100" width="190" height="30" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="643" y="120" text-anchor="middle" font-size="11" fill="#2563EB">StateGraph 状态图</text>
  </g>
  <line x1="643" y1="130" x2="643" y2="150" stroke="#6B7280" stroke-width="1.5" marker-end="url(#a)"/>

  <g filter="url(#s)">
    <rect x="548" y="155" width="88" height="28" rx="7" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="592" y="174" text-anchor="middle" font-size="11" fill="#2563EB">agent</text>
  </g>
  <g filter="url(#s)">
    <rect x="650" y="155" width="88" height="28" rx="7" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
    <text x="694" y="174" text-anchor="middle" font-size="11" fill="#2563EB">tools</text>
  </g>

  <!-- 条件边标注 -->
  <path d="M 575 183 L 555 210" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="548" y="228" text-anchor="middle" font-size="9" fill="#3B82F6">调工具→tools</text>
  <path d="M 610 183 L 640 210" stroke="#059669" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="660" y="228" text-anchor="middle" font-size="9" fill="#059669">结束→END</text>

  <!-- tools→agent 循环 -->
  <path d="M 650 169 L 636 169" stroke="#3B82F6" stroke-width="1" fill="none" stroke-dasharray="3,2"/>

  <text x="643" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563EB">~20 行代码</text>
  <text x="643" y="325" text-anchor="middle" font-size="10" fill="#1E3A5F">白盒 · 显式控制流</text>
  <text x="643" y="342" text-anchor="middle" font-size="10" fill="#1E3A5F">生产级 · 每步可调试</text>

  <!-- 底部对比说明 -->
  <g filter="url(#s)">
    <rect x="25" y="385" width="735" height="10" rx="5" fill="none"/>
  </g>

</svg>
</body>
</html>
